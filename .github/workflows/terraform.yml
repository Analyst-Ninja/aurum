name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
  pull_request:
    paths:
      - "infra/terraform/**"

defaults:
  run:
    working-directory: infra/terraform

jobs:
  validate:
    name: Format, validate, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - name: Format check
        run: terraform fmt -check -recursive -diff

      - name: Init (no backend — validation only)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

      - name: Set up tflint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1

      - name: Lint
        run: |
          tflint --init
          tflint --recursive --format compact

  # terraform plan/apply run LOCALLY by design:
  # - kafka/postgres providers target compose endpoints on the operator machine
  # - tfstate is local and gitignored (see docs/infra-as-code.md §5)
