name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uvx ruff check src/ main.py

      - name: Tests (pytest)
        run: |
          if [ -d tests ]; then
            uv run --with pytest pytest tests/ -v
          else
            echo "No tests/ directory yet — skipping"
          fi

  sonarqube:
    name: SonarQube analysis
    runs-on: ubuntu-latest
    needs: python
    # Skip on forks: secrets are unavailable there
    if: github.event.pull_request.head.repo.fork != true
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history — SonarQube needs it for accurate new-code detection
          fetch-depth: 0

      - name: SonarQube scan
        uses: sonarsource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Quality gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
